services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: prod
    image: leader-wiki-bot:prod
    env_file: .env
    environment:
      WIKI_LOCAL_PATH: /workspace/leader-wiki
      WIKI_SYNC_INTERVAL_CRON: ""
      PORT: "3334"
      QUERY_LOG_DB_PATH: /workspace/data/queries.db
    volumes:
      - ../leader-wiki:/workspace/leader-wiki:ro
      - ./data:/workspace/data
    ports:
      - "127.0.0.1:3334:3334"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
