services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    env_file: .env
    environment:
      WIKI_LOCAL_PATH: /workspace/leader-wiki
    volumes:
      - ../leader-wiki:/workspace/leader-wiki:ro
      - ./src:/app/src
      - ./tests:/app/tests
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    ports:
      - "3000:3000"
    command: pnpm dev
